<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MemeZone 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e0e;
      --card: #1a1a1a;
      --accent: #ff3c3c;
      --accent2: #ffcc00;
      --text: #f0f0f0;
      --muted: #888;
      --border: #2e2e2e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-family: 'Bangers', cursive;
      font-size: 2.4rem;
      letter-spacing: 2px;
      color: var(--accent2);
      text-shadow: 3px 3px 0 var(--accent);
    }

    header span {
      font-size: 0.85rem;
      color: var(--muted);
      background: #2a2a2a;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
    }

    /* MAIN GRID */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .section-title {
      font-family: 'Bangers', cursive;
      font-size: 1.6rem;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .card-body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .upvotes {
      background: #ff3c3c22;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #ff3c3c44;
    }

    .author {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }

    /* NO MEMES */
    .empty {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🔥 MemeZone</h1>
    <span>Top memes from Reddit today</span>
  </header>

  <main>
    <div class="section-title">🚀 Today's Hot Memes</div>

    {% if memes %}
    <div class="grid">
      {% for meme in memes %}
      <a class="card-link" href="{{ meme.link }}" target="_blank">
        <div class="card">
          <img src="{{ meme.url }}" alt="{{ meme.title }}" loading="lazy"/>
          <div class="card-body">
            <div class="card-title">{{ meme.title }}</div>
            <div class="card-meta">
              <span class="upvotes">⬆ {{ meme.upvotes | int }}</span>
              <span class="author">u/{{ meme.author }}</span>
            </div>
          </div>
        </div>
      </a>
      {% endfor %}
    </div>
    {% else %}
    <div class="empty">😢 No memes found right now. Try again later!</div>
    {% endif %}
  </main>

  <footer>
    Built with Flask 🐍 + Reddit API &nbsp;|&nbsp; MemeZone 2026
  </footer>

</body>
</html>
